{% extends "brand_base.html" %}
{% block title %}Login Error{% endblock %}

{% block content %}
<div class="px-6 lg:px-8 py-8">
    <div class="max-w-md mx-auto">
        <div class="bg-brand-surface rounded-xl border border-white/10 p-8 text-center">
            <div class="w-12 h-12 rounded-full bg-red-900/30 flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h2 class="text-base font-heading font-medium text-white mb-2">Login failed</h2>
            <p class="text-sm text-white/50 mb-6">{{ error }}</p>
            <a href="{{ retry_url }}" class="inline-flex items-center px-5 py-2.5 text-sm font-medium rounded-lg bg-brand-accent text-white hover:bg-brand-accent-hover transition-colors">
                Try again
            </a>
            <p class="text-xs text-white/25 mt-4">
                If this keeps happening, email <a href="mailto:rutger@pantalytics.com" class="text-brand-accent hover:underline">rutger@pantalytics.com</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
