<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odoo + AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .grid {
    display: grid;
    grid-template-columns: 140px 220px 140px;
    grid-template-rows: repeat(3, 140px);
    gap: 1px;
    background: #e5e7eb;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    overflow: hidden;
  }
  .card {
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .card img {
    max-width: 64px;
    max-height: 64px;
    object-fit: contain;
  }
  .card.center {
    background: white;
    grid-row: 1 / 4;
    grid-column: 2;
    padding: 32px 40px;
    flex-direction: column;
    gap: 24px;
  }
  .card.center .odoo-logo {
    max-width: 160px;
    max-height: 160px;
  }
  .card.center .pantalytics {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card.center .pantalytics img {
    width: 24px;
    height: 24px;
  }
  .card.center .pantalytics span {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #2B5797;
    letter-spacing: -0.2px;
  }
  .card img.small {
    max-width: 36px;
    max-height: 36px;
  }
</style>
</head>
<body>
<div class="grid">
  <!-- Left column -->
  <div class="card">
    <img src="logos/claude.svg" alt="Claude">
  </div>
  <!-- Center (spans all 3 rows) -->
  <div class="card center">
    <img src="logos/odoo-purple.svg" alt="Odoo" class="odoo-logo">
  </div>
  <!-- Right column -->
  <div class="card">
    <img src="logos/gemini.png" alt="Gemini">
  </div>

  <div class="card">
    <img src="logos/openai.svg" alt="OpenAI">
  </div>
  <div class="card">
    <img src="logos/mistral.svg" alt="Mistral">
  </div>

  <div class="card">
    <img src="logos/copilot.svg" alt="Copilot">
  </div>
  <div class="card" style="gap:8px;">
    <img src="logos/pantalytics-icon.png" alt="Pantalytics" style="max-width:24px;max-height:24px;">
    <span style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;color:#171717;letter-spacing:-0.2px;">Pantalytics</span>
  </div>
</div>
</body>
</html>
