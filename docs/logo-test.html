<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Test</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #fafafa; padding: 40px; }
  .logo-row { display: flex; align-items: center; gap: 24px; padding: 24px; background: white; border: 1px solid #e5e7eb; border-radius: 12px; margin-bottom: 16px; }
  .logo-row svg { width: 64px; height: 64px; flex-shrink: 0; }
  .logo-row .name { font-size: 18px; font-weight: 600; color: #171717; }
  .logo-row .status { font-size: 14px; color: #888; }
  .logo-row.odoo { background: #714B67; }
  .logo-row.odoo .name { color: white; }
  .logo-row.odoo .status { color: #ccc; }
  .logo-row.odoo svg { width: 120px; height: 40px; }
</style>
</head>
<body>

<div class="logo-row">
  <!-- Claude: sunburst/sparkle mark in terracotta -->
  <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M24 4 L26.5 18.5 L38 8 L30 20.5 L44 24 L30 27.5 L38 40 L26.5 29.5 L24 44 L21.5 29.5 L10 40 L18 27.5 L4 24 L18 20.5 L10 8 L21.5 18.5 Z" fill="#D97757"/>
  </svg>
  <div>
    <span class="name">1. Claude</span>
    <div class="status">Sparkle/sunburst mark</div>
  </div>
</div>

<div class="logo-row">
  <!-- OpenAI: thinner version of the knot -->
  <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M41.03 20.87a9.57 9.57 0 00-.82-7.88 9.68 9.68 0 00-10.43-4.7 9.57 9.57 0 00-7.22-3.22 9.68 9.68 0 00-9.24 6.72 9.57 9.57 0 00-6.4 4.7 9.68 9.68 0 001.18 11.39 9.57 9.57 0 00.82 7.88 9.68 9.68 0 0010.43 4.7 9.57 9.57 0 007.22 3.22 9.68 9.68 0 009.24-6.72 9.57 9.57 0 006.4-4.7 9.68 9.68 0 00-1.18-11.39z" fill="none" stroke="#171717" stroke-width="1.2"/>
    <path d="M24.35 41.85a7.23 7.23 0 01-4.63-1.67l.2-.12 7.63-4.4a1.24 1.24 0 00.63-1.08V24l3.22 1.86v8.95a7.24 7.24 0 01-7.05 7.04zM9.3 35.03a7.2 7.2 0 01-.86-4.84l.2.12 7.63 4.4a1.24 1.24 0 001.25 0l9.32-5.38v3.72l-7.72 4.46a7.24 7.24 0 01-9.82-2.48zM7.46 17.82a7.2 7.2 0 013.76-3.16v9.06a1.24 1.24 0 00.63 1.08l9.32 5.38-3.22 1.86-7.72-4.46a7.24 7.24 0 01-2.77-9.76zm27.15 6.32l-9.32-5.38 3.22-1.86 7.72 4.46a7.24 7.24 0 01-1.05 12.73v-9.06a1.24 1.24 0 00-.57-.89zM37.67 18.6l-.2-.12-7.63-4.4a1.24 1.24 0 00-1.25 0l-9.32 5.38v-3.72l7.72-4.46a7.24 7.24 0 0110.68 7.32zm-20.24 6.58l-3.22-1.86v-8.95a7.24 7.24 0 0111.87-5.57l-.2.12-7.63 4.4a1.24 1.24 0 00-.63 1.08zm1.75-3.77l4.14-2.39 4.14 2.39v4.78l-4.14 2.39-4.14-2.39z" fill="#171717"/>
  </svg>
  <div>
    <span class="name">2. OpenAI</span>
    <div class="status">Thinner strokes</div>
  </div>
</div>

<div class="logo-row">
  <!-- Microsoft Copilot: the actual two-tone swoosh icon -->
  <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M25.2 7.5a11.7 11.7 0 00-9.5 4.9l11 7.6 8.3-5.4a11.7 11.7 0 00-9.8-7.1z" fill="#2AA2D5"/>
    <path d="M15.7 12.4A11.7 11.7 0 006 24c0 2.3.7 4.5 1.8 6.3l11.5-3.7 2.4-6.6-6-7.6z" fill="#4F8EDB"/>
    <path d="M7.8 30.3A11.7 11.7 0 0018 40.5c2-.1 3.9-.6 5.6-1.6l-.5-12.1-4.8-2.4L7.8 30.3z" fill="#2BC98F"/>
    <path d="M23.6 38.9a11.7 11.7 0 0011.1-5.2l-11.5-7.1-8 5.1a11.7 11.7 0 008.4 7.2z" fill="#F0793B"/>
    <path d="M34.7 33.7A11.7 11.7 0 0042 24c0-2.1-.5-4-1.5-5.8L29.3 22l-5.6 4.6 11 7.1z" fill="#EE5BAE"/>
    <path d="M40.5 18.2a11.7 11.7 0 00-5.5-10.7c-1.7-1-3.7-1.5-5.8-1.5L25 20l10 .1 5.5-1.9z" fill="#9B59B6"/>
  </svg>
  <div>
    <span class="name">3. Microsoft Copilot</span>
    <div class="status">Multi-color swoosh</div>
  </div>
</div>

<div class="logo-row">
  <!-- Gemini: four-pointed sparkle with rounded curves -->
  <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M24 4C24 15.05 15.05 24 4 24c11.05 0 20 8.95 20 20 0-11.05 8.95-20 20-20C32.95 24 24 15.05 24 4z" fill="url(#g2)"/>
    <defs>
      <linearGradient id="g2" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
        <stop stop-color="#1C7CF4"/>
        <stop offset=".5" stop-color="#6E44E2"/>
        <stop offset="1" stop-color="#D1395E"/>
      </linearGradient>
    </defs>
  </svg>
  <div>
    <span class="name">4. Gemini</span>
    <div class="status">Sparkle with 3-stop gradient</div>
  </div>
</div>

<div class="logo-row">
  <!-- Mistral: the M-shaped pixel logo with correct pattern -->
  <svg viewBox="0 0 52 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Row 1 -->
    <rect x="0" y="0" width="8" height="8" fill="#F7D046"/>
    <rect x="22" y="0" width="8" height="8" fill="#171717"/>
    <rect x="44" y="0" width="8" height="8" fill="#F7D046"/>
    <!-- Row 2 -->
    <rect x="0" y="9" width="8" height="8" fill="#F2A73B"/>
    <rect x="11" y="9" width="8" height="8" fill="#171717"/>
    <rect x="33" y="9" width="8" height="8" fill="#171717"/>
    <rect x="44" y="9" width="8" height="8" fill="#F2A73B"/>
    <!-- Row 3 -->
    <rect x="0" y="18" width="8" height="8" fill="#EE792F"/>
    <rect x="11" y="18" width="8" height="8" fill="#EE792F"/>
    <rect x="22" y="18" width="8" height="8" fill="#171717"/>
    <rect x="33" y="18" width="8" height="8" fill="#EE792F"/>
    <rect x="44" y="18" width="8" height="8" fill="#EE792F"/>
    <!-- Row 4 -->
    <rect x="0" y="27" width="8" height="8" fill="#EB5829"/>
    <rect x="44" y="27" width="8" height="8" fill="#EB5829"/>
    <!-- Row 5 -->
    <rect x="0" y="36" width="8" height="8" fill="#171717"/>
    <rect x="44" y="36" width="8" height="8" fill="#171717"/>
  </svg>
  <div>
    <span class="name">5. Mistral</span>
    <div class="status">M-shape pixel art</div>
  </div>
</div>

<div class="logo-row odoo">
  <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M15.5 8C9 8 3.5 13.3 3.5 20s5.5 12 12 12 12-5.3 12-12-5.5-12-12-12zm0 18.4c-3.6 0-6.5-2.9-6.5-6.4s2.9-6.4 6.5-6.4 6.5 2.9 6.5 6.4-2.9 6.4-6.5 6.4z" fill="white"/>
    <path d="M42 8c-6.5 0-12 5.3-12 12s5.5 12 12 12 12-5.3 12-12S48.5 8 42 8zm0 18.4c-3.6 0-6.5-2.9-6.5-6.4s2.9-6.4 6.5-6.4 6.5 2.9 6.5 6.4-2.9 6.4-6.5 6.4z" fill="white"/>
    <path d="M68.5 8C62 8 56.5 13.3 56.5 20s5.5 12 12 12 12-5.3 12-12-5.5-12-12-12zm0 18.4c-3.6 0-6.5-2.9-6.5-6.4s2.9-6.4 6.5-6.4 6.5 2.9 6.5 6.4-2.9 6.4-6.5 6.4z" fill="white"/>
    <path d="M95 8c-6.5 0-12 5.3-12 12v12h5.5V20c0-3.5 2.9-6.4 6.5-6.4s6.5 2.9 6.5 6.4v12h5.5V20c0-6.7-5.5-12-12-12z" fill="white"/>
    <path d="M116.5 20c0-6.7-5.5-12-12-12v5.6c3.6 0 6.5 2.9 6.5 6.4s-2.9 6.4-6.5 6.4V32c6.5 0 12-5.3 12-12z" fill="white"/>
  </svg>
  <div>
    <span class="name">6. Odoo</span>
    <div class="status">Previously approved</div>
  </div>
</div>

</body>
</html>
